services:
  node-prod-base:
    image: ruflo-node-prod:latest
    build:
      context: .
      dockerfile: infra/docker/node-prod/Dockerfile
    profiles: ["build"]

  traefik:
    image: traefik:v3.1
    security_opt:
    - no-new-privileges:false
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-80}:80"
      - "127.0.0.1:${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./infra/traefik/certs:/etc/traefik/certs:ro
    restart: unless-stopped
    networks: [ruflo]

  web:
    image: ruflo-node-prod:latest
    working_dir: /workspace
    command: sh -c "npm run start -w @ruflo/web"
    env_file: .env
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-https://alemhub.sbs}
      WEB_URL: ${WEB_URL:-https://alemhub.sbs}
      API_URL: ${API_URL:-https://alemhub.sbs/api}
      API_INTERNAL_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_BASE_URL: ${API_URL:-https://alemhub.sbs/api}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://alemhub.sbs/auth}
      NEXT_PUBLIC_KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://alemhub.sbs/auth}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      NEXT_PUBLIC_WEB_URL: ${WEB_URL:-https://alemhub.sbs}
    ports:
      - "127.0.0.1:${WEB_PORT:-3001}:3001"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "sbs_ruflo"
      traefik.http.routers.web.entrypoints: "web"
      traefik.http.routers.web.rule: "Host(`alemhub.sbs`) && !PathPrefix(`/auth`) && !PathPrefix(`/admin`)"
      traefik.http.routers.web.priority: "10"
      traefik.http.routers.web.middlewares: "forwarded-https@file"
      traefik.http.services.web.loadbalancer.server.port: "3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/signin >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks: [ruflo]

  admin:
    image: ruflo-node-prod:latest
    working_dir: /workspace
    command: sh -c "npm run start -w @ruflo/admin"
    env_file: .env
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-https://alemhub.sbs}
      ADMIN_URL: ${ADMIN_URL:-https://alemhub.sbs/admin}
      NEXT_PUBLIC_API_BASE_URL: ${API_URL:-https://alemhub.sbs/api}
      API_INTERNAL_BASE_URL: http://api:3000
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://alemhub.sbs/auth}
      NEXT_PUBLIC_KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://alemhub.sbs/auth}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://alemhub.sbs/admin}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-admin-nextauth-secret}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-https://alemhub.sbs/admin}
    ports:
      - "127.0.0.1:${ADMIN_PORT:-3002}:3002"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "sbs_ruflo"
      traefik.http.middlewares.admin-compliance-redirect.redirectregex.regex: "^https?://alemhub\\.sbs/admin/compliance/?$"
      traefik.http.middlewares.admin-compliance-redirect.redirectregex.replacement: "https://alemhub.sbs/compliance"
      traefik.http.middlewares.admin-compliance-redirect.redirectregex.permanent: "false"
      traefik.http.routers.admin.entrypoints: "web"
      traefik.http.routers.admin.rule: "Host(`alemhub.sbs`) && PathPrefix(`/admin`)"
      traefik.http.routers.admin.priority: "80"
      traefik.http.services.admin.loadbalancer.server.port: "3002"
    restart: unless-stopped
    networks: [ruflo]

  api:
    image: ruflo-node-prod:latest
    working_dir: /workspace
    command: sh scripts/start-api-prod.sh
    env_file: .env
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-https://alemhub.sbs}
      WEB_URL: ${WEB_URL:-https://alemhub.sbs}
      ADMIN_URL: ${ADMIN_URL:-https://alemhub.sbs/admin}
      API_URL: ${API_URL:-https://alemhub.sbs/api}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://alemhub.sbs/auth}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://alemhub.sbs/auth/realms/ruflo}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      KEYCLOAK_BOOTSTRAP_ON_STARTUP: ${KEYCLOAK_BOOTSTRAP_ON_STARTUP:-false}
      PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
      SMTP_FROM: ${SMTP_FROM:-noreply@alemhub.sbs}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-support@alemhub.sbs}
      SMTP_SUPPORT_EMAIL: ${SMTP_SUPPORT_EMAIL:-support@alemhub.sbs}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    labels:
      traefik.enable: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health/readiness | grep -q '\"status\":\"ready\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks: [ruflo]

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025"
    restart: unless-stopped
    networks: [ruflo]

  worker:
    image: ruflo-node-prod:latest
    working_dir: /workspace
    command: sh -c "npm run start -w @ruflo/worker"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    networks: [ruflo]

  ai-worker:
    image: ruflo-node-prod:latest
    working_dir: /workspace
    command: sh -c "npm run start -w @ruflo/ai-worker"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [ruflo]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ruflo}
      POSTGRES_USER: ${POSTGRES_USER:-ruflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-ruflo} -d ${POSTGRES_DB:-ruflo}
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    networks: [ruflo]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./infra/data/redis:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [ruflo]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - ./infra/data/minio:/data
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [ruflo]

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me}
    volumes:
      - ./infra/data/meilisearch:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:7700/health
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [ruflo]

  keycloak:
    image: ruflo-keycloak:latest
    build:
      context: .
      dockerfile: infra/docker/keycloak/Dockerfile
    command:
      - start
      - --optimized
      - --http-port=8080
      - --hostname-url=https://${KEYCLOAK_HOSTNAME:-alemhub.sbs}/auth
      - --hostname-admin-url=https://${KEYCLOAK_HOSTNAME:-alemhub.sbs}/auth
      - --hostname-strict=false
      - --hostname-strict-https=false
      - --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_SPI_STICKY_SESSION_ENCODER_INFINISPAN_SHOULD_ATTACH_ROUTE: "false"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "sbs_ruflo"
      traefik.http.routers.auth.entrypoints: "web"
      traefik.http.routers.auth.rule: "Host(`alemhub.sbs`) && PathPrefix(`/auth`)"
      traefik.http.routers.auth.priority: "100"
      traefik.http.services.auth.loadbalancer.server.port: "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /bin/bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf "GET /auth/health/ready HTTP/1.1\r\nHost: alemhub.sbs\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200" <&3'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks: [ruflo]

  keycloak-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - ./infra/data/keycloak-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U keycloak -d keycloak
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    networks: [ruflo]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    restart: unless-stopped
    networks: [ruflo]

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infra/observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks: [ruflo]

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3003}:3000"
    restart: unless-stopped
    networks: [ruflo]

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    restart: unless-stopped
    networks: [ruflo]

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks: [ruflo]

  tempo:
    image: grafana/tempo:2.7.1
    user: "0:0"
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"
    restart: unless-stopped
    networks: [ruflo]

networks:
  ruflo:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:
