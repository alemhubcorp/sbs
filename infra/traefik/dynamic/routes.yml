http:
  middlewares:
    admin-root-redirect:
      redirectRegex:
        regex: "^https?://alemhub\\.sbs/admin/?$"
        replacement: "https://alemhub.sbs/admin/auth/login"
        permanent: false
    admin-compliance-redirect:
      redirectRegex:
        regex: "^https?://alemhub\\.sbs/admin/compliance/?$"
        replacement: "https://alemhub.sbs/compliance"
        permanent: false
    forwarded-https:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
          X-Forwarded-Host: "alemhub.sbs"
          X-Forwarded-Port: "443"
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"
          X-Powered-By: ""

  routers:
    # HTTP → HTTPS redirect (catches all plain HTTP traffic)
    http-catchall:
      rule: "Host(`alemhub.sbs`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: noop
      priority: 1

    # HTTPS routers — served by websecure entrypoint only
    admin-root:
      rule: "Host(`alemhub.sbs`) && (Path(`/admin`) || Path(`/admin/`))"
      entryPoints:
        - websecure
      middlewares:
        - admin-root-redirect
      service: admin
      priority: 110
      tls: {}

    web:
      rule: "Host(`alemhub.sbs`) && !PathPrefix(`/api`) && !PathPrefix(`/auth`) && !PathPrefix(`/admin`)"
      entryPoints:
        - websecure
      middlewares:
        - forwarded-https
        - security-headers
      service: web
      tls: {}

    admin:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/admin`)"
      entryPoints:
        - websecure
      middlewares:
        - admin-root-redirect
        - admin-compliance-redirect
        - forwarded-https
        - security-headers
      service: admin
      priority: 80
      tls: {}

    # Web app handles these admin-path pages that live in the web app, not admin app
    web-admin-extensions:
      rule: "Host(`alemhub.sbs`) && (PathPrefix(`/admin/api-connections`) || PathPrefix(`/admin/payments`))"
      entryPoints:
        - websecure
      middlewares:
        - forwarded-https
        - security-headers
      service: web
      priority: 85
      tls: {}

    api:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      middlewares:
        - forwarded-https
        - security-headers
      service: api
      priority: 90
      tls: {}

    auth:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/auth`)"
      entryPoints:
        - websecure
      middlewares:
        - security-headers
      service: auth
      priority: 100
      tls: {}

  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:3001"

    admin:
      loadBalancer:
        servers:
          - url: "http://admin:3002"

    api:
      loadBalancer:
        servers:
          - url: "http://api:3000"

    auth:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"

    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"
