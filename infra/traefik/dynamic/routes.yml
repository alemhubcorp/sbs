http:
  middlewares:
    admin-compliance-redirect:
      redirectRegex:
        regex: "^https?://alemhub\\.sbs/admin/compliance/?$"
        replacement: "https://alemhub.sbs/compliance"
        permanent: false
    forwarded-https:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
          X-Forwarded-Host: "alemhub.sbs"
          X-Forwarded-Port: "443"
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"
          X-Powered-By: ""

  routers:
    # ── HTTP routers (port 80) — cloudflared tunnel sends HTTP here ──────────
    # These must have higher priority than http-catchall (priority 1).
    # forwarded-https ensures backends receive X-Forwarded-Proto: https.

    auth-http:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/auth`)"
      entryPoints: [web]
      middlewares: [forwarded-https]
      service: auth
      priority: 100

    admin-http:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/admin`)"
      entryPoints: [web]
      middlewares: [admin-compliance-redirect, forwarded-https]
      service: admin
      priority: 80

    web-http:
      rule: "Host(`alemhub.sbs`) && !PathPrefix(`/auth`) && !PathPrefix(`/admin`)"
      entryPoints: [web]
      middlewares: [forwarded-https]
      service: web
      priority: 10

    # Catch any remaining plain-HTTP traffic and redirect to HTTPS
    http-catchall:
      rule: "Host(`alemhub.sbs`)"
      entryPoints: [web]
      middlewares: [redirect-to-https]
      service: noop
      priority: 1

    # ── HTTPS routers (port 443) — for direct TLS access ─────────────────────
    auth:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/auth`)"
      entryPoints: [websecure]
      middlewares: [forwarded-https]
      service: auth
      priority: 100
      tls: {}

    admin:
      rule: "Host(`alemhub.sbs`) && PathPrefix(`/admin`)"
      entryPoints: [websecure]
      middlewares: [admin-compliance-redirect, forwarded-https, security-headers]
      service: admin
      priority: 80
      tls: {}

    web:
      rule: "Host(`alemhub.sbs`) && !PathPrefix(`/auth`) && !PathPrefix(`/admin`)"
      entryPoints: [websecure]
      middlewares: [forwarded-https, security-headers]
      service: web
      tls: {}

  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:3001"

    admin:
      loadBalancer:
        servers:
          - url: "http://admin:3002"

    auth:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"

    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"
