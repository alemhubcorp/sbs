name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: aws-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Deploy to AWS
        run: PROJECT_DIR="$HOME/sbs" bash scripts/deploy-aws.sh
